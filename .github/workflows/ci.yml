name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_MIN: "100.0"

jobs:
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build
        run: GOWORK=off CGO_ENABLED=0 go build ./...
      - name: Vet
        run: GOWORK=off CGO_ENABLED=0 go vet ./...
      - name: Test
        run: GOWORK=off CGO_ENABLED=0 go test ./...
      - name: Coverage (library packages must be 100%)
        run: |
          set -euo pipefail
          GOWORK=off CGO_ENABLED=0 go test -coverprofile=cover.out ./src/...
          total=$(go tool cover -func=cover.out \
            | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "library coverage: ${total}%"
          awk -v t="$total" -v m="$COVERAGE_MIN" \
            'BEGIN { exit (t+0 >= m+0) ? 0 : 1 }' \
            || { echo "coverage ${total}% < ${COVERAGE_MIN}%"; exit 1; }

  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: "rv64,v=true,vlen=128"
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: "la464"
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: "power9"
          - arch: s390x
            image: debian:trixie
            qemu_cpu: "qemu"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Set up binfmt (QEMU)
        run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: Cross-compile per-package test binaries (library packages)
        run: |
          set -euo pipefail
          mkdir -p testbins
          for pkg in $(GOWORK=off go list ./src/...); do
            name=$(echo "$pkg" | tr '/' '_')
            if ! GOWORK=off CGO_ENABLED=0 GOARCH=${{ matrix.arch }} \
                go test -c -cover -o "testbins/${name}.test" "$pkg"; then
              echo "build failed for $pkg"; exit 1
            fi
            if [ -f "testbins/${name}.test" ]; then
              echo "$name $pkg" >> testbins/manifest.txt
            else
              echo "no test binary for $pkg (no tests) — skipping"
            fi
          done
      - name: Run test binaries under QEMU and gate total coverage
        run: |
          set -euo pipefail
          if [ ! -f testbins/manifest.txt ]; then
            echo "no test binaries to run"; exit 1
          fi
          # Aggregate coverage across all library packages into a single
          # profile, mirroring the native `go test ./src/...` total gate.
          echo "mode: set" > testbins/merged.cover
          while read -r name pkg; do
            echo "::group::${pkg} (${{ matrix.arch }})"
            docker run --rm \
              --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU="${{ matrix.qemu_cpu }}" \
              -v "$PWD/testbins:/t" \
              -w /t \
              ${{ matrix.image }} \
              ./${name}.test -test.v -test.coverprofile="/t/${name}.cover"
            grep -h -v '^mode:' "testbins/${name}.cover" >> testbins/merged.cover
            echo "::endgroup::"
          done < testbins/manifest.txt
          total=$(go tool cover -func=testbins/merged.cover \
            | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "library coverage: ${total}%"
          awk -v t="$total" -v m="$COVERAGE_MIN" \
            'BEGIN { exit (t+0 >= m+0) ? 0 : 1 }' \
            || { echo "coverage ${total}% < ${COVERAGE_MIN}%"; exit 1; }
